name: Lint Check
on:
  push:
    branches: ["feature/*", "feat/*", "features/*"]
    paths: ["src/**", "test/**", "*.gradle.kts"]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: "25"
          distribution: "temurin"
          cache: "gradle"

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Lint check
        run: ./gradlew ktlintCheck
