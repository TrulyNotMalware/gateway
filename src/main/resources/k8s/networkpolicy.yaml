# Default-deny all ingress/egress for the api-gateway pods; then explicitly allow what is needed.
#
# Ingress:  istio-system data-plane → 8080 (public traffic); monitoring → 8081 (Prometheus scrape)
# Egress:   blog_be (ns blog, port 8080, also serves JWKS), redis (ns infra, 6379),
#           kube-dns (53), dok/file backends (see placeholder note below)
#
# IMPORTANT: the gateway sits behind the Spring Cloud Gateway data plane in `istio-system`
# (the `api-gateway` Gateway lives there). If you front it with a different Gateway API
# implementation, change the ingress namespaceSelector below to that data-plane namespace
# (istio-system / envoy-gateway-system / nginx-gateway / kgateway-system).
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: api-gateway-ingress
  namespace: api-service
  labels:
    app: api-gateway-deploy
spec:
  podSelector:
    matchLabels:
      app: api-gateway-deploy
  policyTypes:
    - Ingress
  ingress:
    # Public traffic from the Istio data plane → app port 8080.
    #
    # SECURITY INVARIANT — application-prod.yaml's `trusted-proxies` regex trusts the
    # private ranges on the assumption that ONLY the istio-system data plane can reach
    # port 8080. Widening this ingress rule lets any allowed pod spoof X-Forwarded-For
    # (the gateway would treat it as a trusted proxy hop) and evade per-IP rate
    # limiting / blacklisting. Change both together or not at all.
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: istio-system
      ports:
        - protocol: TCP
          port: 8080
    # Prometheus scrape of the management port 8081 (/actuator/prometheus).
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      ports:
        - protocol: TCP
          port: 8081
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: api-gateway-egress
  namespace: api-service
  labels:
    app: api-gateway-deploy
spec:
  podSelector:
    matchLabels:
      app: api-gateway-deploy
  policyTypes:
    - Egress
  egress:
    # blog_be — routed traffic + JWKS fetch (http://blog-app.blog.svc.cluster.local:8080).
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: blog
          podSelector:
            matchLabels:
              app.kubernetes.io/name: blog-app
      ports:
        - protocol: TCP
          port: 8080
    # Redis cluster — rate-limit / blacklist counters (redis-cluster.infra.svc.cluster.local:6379).
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: infra
      ports:
        - protocol: TCP
          port: 6379
    # kube-dns
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # dok backend — PRJ_DOK_URI = http://dok-svc.dok.svc.cluster.local:8080 (ns `dok`).
    # PLACEHOLDER: namespace is known from the ConfigMap, but the backend pod labels are NOT
    # determinable from this repo. Add a podSelector (app.kubernetes.io/name: <dok-app>) to
    # tighten this once the dok service's labels are confirmed. HUMAN REVIEW REQUIRED.
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: dok
      ports:
        - protocol: TCP
          port: 8080
    # file backend (fileserver) — routed traffic + JWKS fetch.
    # PRJ_FILE_URI = http://fileserver.fileserver.svc.cluster.local:80; the Service maps
    # port 80 → containerPort 8880, and NetworkPolicy matches the POD port, hence 8880.
    # Labels per fileserver/deploy/k8s/{deployment,service}.yaml.
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: fileserver
          podSelector:
            matchLabels:
              app.kubernetes.io/name: fileserver
      ports:
        - protocol: TCP
          port: 8880
