apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway-deploy
  namespace: api-service
  labels:
    app: api-gateway-deploy
spec:
  replicas: 2
  revisionHistoryLimit: 5
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: api-gateway-deploy
  template:
    metadata:
      labels:
        app: api-gateway-deploy
      annotations:
        # Direct Prometheus to scrape /actuator/prometheus on the management port (8081).
        # Actuator is not exposed on the public port (80); management.server.port=8081 keeps them separate.
        prometheus.io/scrape: "true"
        prometheus.io/path: "/actuator/prometheus"
        prometheus.io/port: "8081"
    spec:
      imagePullSecrets:
        - name: dockercred
      # Graceful drain budget for in-flight requests (matches server.shutdown=graceful + lifecycle.timeout-per-shutdown-phase=30s).
      terminationGracePeriodSeconds: 45
      containers:
        - name: api-gateway-deploy
          image: $IMAGE_NAME
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
            - name: mgmt
              containerPort: 8081
              protocol: TCP
          imagePullPolicy: Always
          volumeMounts:
            - name: tz-seoul
              mountPath: /etc/localtime
              readOnly: true
          envFrom:
            - configMapRef:
                name: api-gateway-cm
            # Sensitive values (e.g. Redis password) come from Secret. Secret keys must match ConfigMap keys,
            # e.g. APP_CONFIG_REDIS_PASSWORD.
            - secretRef:
                name: api-gateway-secret
                optional: true
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
          # k8s probes hit the management port (8081) actuator health from inside the cluster.
          startupProbe:
            httpGet:
              path: /actuator/health/liveness
              port: mgmt
            failureThreshold: 30
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: mgmt
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: mgmt
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          # Pre-stop hook — give k8s endpoints time to converge (drain traffic before graceful shutdown).
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 10"]
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            runAsNonRoot: true
            runAsUser: 1000
            capabilities:
              drop: ["ALL"]
      volumes:
        - name: tz-seoul
          hostPath:
            path: /usr/share/zoneinfo/Asia/Seoul
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: api-gateway-pdb
  namespace: api-service
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: api-gateway-deploy
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: api-gateway-hpa
  namespace: api-service
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: api-gateway-deploy
  minReplicas: 2
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
    scaleUp:
      stabilizationWindowSeconds: 30
