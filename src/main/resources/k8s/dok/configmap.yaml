apiVersion: v1
kind: ConfigMap
metadata:
  name: api-gateway-cm
  namespace: api-service
data:
  # Spring Boot relaxed binding requires underscored names here:
  # envFrom skips hyphenated keys, so use PRJ_DOK_ORIGINS instead of prj-dok-origins.
  PRJ_DOK_ORIGINS: "https://notypie.dev"

  # HTTP client timeouts (milliseconds).
  PROD_HTTP_CLIENT_CONNECT_TIMEOUT: "3000"
  PROD_HTTP_CLIENT_RESPONSE_TIMEOUT: "10000"

  # Downstream service k8s DNS.
  PRJ_DOK_URI: "http://dok-svc.dok.svc.cluster.local:8080"
  PRJ_BE_URI: "http://blog-svc.blog.svc.cluster.local:8080"
  # File service — replace with the real svc DNS when the service is introduced.
  PRJ_FILE_URI: "http://file-svc.file.svc.cluster.local:8080"

  SPRING_PROFILES_ACTIVE: "prod"

  JAVA_TOOL_OPTIONS: "-XX:MaxRAMPercentage=75 -XX:+UseG1GC -XX:+ExitOnOutOfMemoryError"

  # Standalone Redis is required to share rate-limit / blacklist counters across pods
  # when replicas >= 2. Password is injected via Secret (APP_CONFIG_REDIS_PASSWORD).
  APP_CONFIG_REDIS_MODE: "standalone"
  APP_CONFIG_REDIS_HOST: "redis-svc.redis.svc.cluster.local"
  APP_CONFIG_REDIS_PORT: "6379"
  APP_CONFIG_BLACKLIST_STORAGE_MODE: "redis"

  # JWT (HS256, secret shared with blog_be). APP_CONFIG_JWT_SECRET comes from Secret.
  APP_CONFIG_JWT_ISSUER: "blog-be"

  # APP_CONFIG_SECURITY_GATEWAY_SHARED_SECRET is injected via Secret (must equal blog_be's GATEWAY_SHARED_SECRET).

  # Security policy (RateLimit thresholds / Redis-failure stance) — see gateway/README.md.
  # Uncomment to override RateLimit thresholds:
  # APP_CONFIG_SECURITY_IP_MAX_REQUESTS: "1000"
  # APP_CONFIG_SECURITY_USER_MAX_REQUESTS: "500"
  # APP_CONFIG_SECURITY_API_KEY_MAX_REQUESTS: "1000"
  # APP_CONFIG_SECURITY_ENDPOINT_MAX_REQUESTS: "100"
  # APP_CONFIG_SECURITY_WINDOW_SECONDS: "60"
  APP_CONFIG_SECURITY_FAIL_OPEN_ON_REDIS_FAILURE: "true"
