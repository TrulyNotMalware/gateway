apiVersion: v1
kind: ConfigMap
metadata:
  name: api-gateway-cm
  namespace: api-service
data:
  # Spring Boot relaxed binding requires underscored names here:
  # envFrom skips hyphenated keys, so use PRJ_DOK_ORIGINS instead of prj-dok-origins.
  PRJ_DOK_ORIGINS: "https://notypie.dev"

  # HTTP client timeouts (milliseconds).
  PROD_HTTP_CLIENT_CONNECT_TIMEOUT: "3000"
  PROD_HTTP_CLIENT_RESPONSE_TIMEOUT: "10000"

  # Downstream service k8s DNS.
  PRJ_DOK_URI: "http://dok-svc.dok.svc.cluster.local:8080"
  PRJ_BE_URI: "http://blog-app.blog.svc.cluster.local:8080"
  # File service — replace with the real svc DNS when the service is introduced.
  PRJ_FILE_URI: "http://file-svc.file.svc.cluster.local:8080"

  SPRING_PROFILES_ACTIVE: "prod"

  JAVA_TOOL_OPTIONS: "-XX:MaxRAMPercentage=75 -XX:+UseG1GC -XX:+ExitOnOutOfMemoryError"

  # Redis Cluster is the shared source of truth for rate-limit / blacklist counters
  # across pods (replicas >= 2). Password is injected via Secret (APP_CONFIG_REDIS_PASSWORD).
  # Seed node = the cluster's ClusterIP service; Redisson discovers the rest of the
  # topology (announce-ip = pod IP) via CLUSTER NODES, so one seed is sufficient.
  APP_CONFIG_REDIS_MODE: "cluster"
  APP_CONFIG_REDIS_CLUSTER_NODES_0: "redis://redis-cluster.infra.svc.cluster.local:6379"
  APP_CONFIG_BLACKLIST_STORAGE_MODE: "redis"

  # JWT verification — multi-issuer RS256 via JWKS. Each backend signs its own tokens
  # and exposes /.well-known/jwks.json; the gateway routes verification by the `iss` claim.
  # Add a backend by appending APP_CONFIG_JWT_ISSUERS_<N>_ISSUER / _JWKS_URI / _AUDIENCE triples.
  # NetworkPolicy restricts JWKS access to the api-service namespace.
  # `audience` is the `aud` claim the backend stamps on its tokens — gateway rejects mismatches.
  APP_CONFIG_JWT_ISSUERS_0_ISSUER: "blog-be"
  APP_CONFIG_JWT_ISSUERS_0_JWKS_URI: "http://blog-app.blog.svc.cluster.local:8080/.well-known/jwks.json"
  APP_CONFIG_JWT_ISSUERS_0_AUDIENCE: "blog-be"
  # Example second issuer (uncomment + replace with real DNS when file-svc is introduced):
  # APP_CONFIG_JWT_ISSUERS_1_ISSUER: "file-be"
  # APP_CONFIG_JWT_ISSUERS_1_JWKS_URI: "http://file-svc.file.svc.cluster.local:8080/.well-known/jwks.json"
  # APP_CONFIG_JWT_ISSUERS_1_AUDIENCE: "file-be"

  # APP_CONFIG_SECURITY_GATEWAY_SHARED_SECRET is injected via Secret (must equal blog_be's GATEWAY_SHARED_SECRET).

  # Security policy (RateLimit thresholds / Redis-failure stance) — see gateway/README.md.
  # Uncomment to override RateLimit thresholds:
  # APP_CONFIG_SECURITY_IP_MAX_REQUESTS: "1000"
  # APP_CONFIG_SECURITY_USER_MAX_REQUESTS: "500"
  # APP_CONFIG_SECURITY_API_KEY_MAX_REQUESTS: "1000"
  # APP_CONFIG_SECURITY_ENDPOINT_MAX_REQUESTS: "100"
  # APP_CONFIG_SECURITY_WINDOW_SECONDS: "60"
  # Stance when Redis is unreachable (RateLimit source of truth):
  #   FAIL_OPEN         — counters return 0, no throttle (default; matches read-heavy public traffic)
  #   FAIL_CLOSED       — every request rejected; protects backend at cost of availability
  #   HYBRID_IN_MEMORY  — fall back to per-pod ConcurrentHashMap counters (state NOT shared
  #                       across pods → effective limit is multiplied by replica count, but
  #                       single-source bursts still throttle)
  APP_CONFIG_SECURITY_REDIS_FAILURE_MODE: "FAIL_OPEN"
