# Template only — DO NOT commit a populated copy.
# Apply once with real values; stringData fields get base64-encoded by the API server.
#
# Keys (injected into the container directly via envFrom):
#   APP_CONFIG_JWT_SECRET                       HS256 verification key. Minimum 32 bytes required
#                                               (enforced by MIN_HS256_SECRET_BYTES in SecurityConfig.kt).
#                                               Must equal blog_be's JWT_SECRET.
#                                               Generate with: openssl rand -hex 48
#
#   APP_CONFIG_SECURITY_GATEWAY_SHARED_SECRET   Backend hop proof (X-Gateway-Auth).
#                                               Must equal blog_be's GATEWAY_SHARED_SECRET.
#                                               Generate with: openssl rand -hex 32
#
#   APP_CONFIG_REDIS_PASSWORD                   Redis auth (rate-limit / blacklist distributed counters).
#                                               Must match infra/redis operations value.
#
# deployment.yaml's envFrom.secretRef is optional: true, so the pod starts even if the Secret is missing —
# but JWT verification, hop proof, and Redis distributed counters all break, so this must be set in prod.
apiVersion: v1
kind: Secret
metadata:
  name: api-gateway-secret
  namespace: api-service
  labels:
    app: api-gateway-deploy
type: Opaque
stringData:
  APP_CONFIG_JWT_SECRET: "REPLACE_ME_jwt_secret_min_32_bytes_same_as_blog_be"
  APP_CONFIG_SECURITY_GATEWAY_SHARED_SECRET: "REPLACE_ME_shared_secret_same_as_blog_be_GATEWAY_SHARED_SECRET"
  APP_CONFIG_REDIS_PASSWORD: "REPLACE_ME_redis_password"
