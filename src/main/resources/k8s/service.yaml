apiVersion: v1
kind: Service
metadata:
  name: api-gateway-svc
  namespace: api-service
spec:
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP
  selector:
    app: api-gateway-deploy
  type: ClusterIP
  # mgmt 포트(8081) 는 외부 Service 로 노출하지 않음. probe/Prometheus 스크랩은 Pod IP 로 직접 접근.