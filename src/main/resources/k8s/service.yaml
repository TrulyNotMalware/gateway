apiVersion: v1
kind: Service
metadata:
  name: api-gateway-svc
  namespace: api-service
spec:
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP
  selector:
    app: api-gateway-deploy
  type: ClusterIP
  # Management port (8081) is intentionally not exposed via Service. Probes and Prometheus scrape via Pod IP directly.
